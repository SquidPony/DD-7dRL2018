name: Build And Release

on:
  push:
    branches:
      - main

jobs:
  build-native:
    name: Build Native Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          VERSION="0.1.$(git rev-list --count HEAD)-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build fat jar
        run: gradle -p Code :desktop:distJar

      - name: Package app image (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          jpackage \
            --type app-image \
            --name Epigon \
            --input Code/desktop/build/libs \
            --dest release \
            --main-jar "Epigon-${VERSION}.jar" \
            --main-class squidpony.epigon.desktop.DesktopLauncher

      - name: Package app image (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          jpackage `
            --type app-image `
            --name Epigon `
            --input Code/desktop/build/libs `
            --dest release `
            --main-jar "Epigon-$env:VERSION.jar" `
            --main-class squidpony.epigon.desktop.DesktopLauncher

      - name: Archive package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd release
          zip -r "Epigon-${VERSION}-${RUNNER_OS}.zip" Epigon*

      - name: Archive package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path release/Epigon* -DestinationPath "release/Epigon-$env:VERSION-$env:RUNNER_OS.zip" -Force

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: epigon-${{ runner.os }}
          path: release/*.zip

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-native
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and tag
        id: version
        shell: bash
        run: |
          VERSION="0.1.$(git rev-list --count HEAD)-$(git rev-parse --short HEAD)"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Epigon ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release-artifacts/**/*.zip
