name: Build And Release

on:
  push:
    branches:
      - main

jobs:
  build-native:
    name: Build Native Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: false
          cache-read-only: false

      - name: Compute version
        id: version
        shell: bash
        run: |
          VERSION="0.1.$(git rev-list --count HEAD)-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build fat jar
        shell: bash
        run: |
          cd Code
          for attempt in 1 2 3; do
            echo "Build attempt $attempt/3..."
            if gradle :desktop:distJar --refresh-dependencies; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "Build failed, waiting before retry..."
              sleep 30
            fi
          done
          echo "Build failed after 3 attempts"
          exit 1

      - name: Package app image (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          jpackage \
            --type app-image \
            --name "Dragon's Dive" \
            --input Code/desktop/build/libs \
            --dest release \
            --main-jar "Dragon's Dive-${VERSION}.jar" \
            --main-class squidpony.epigon.desktop.DesktopLauncher

      - name: Package app image (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          jpackage `
            --type app-image `
            --name "Dragon's Dive" `
            --input Code/desktop/build/libs `
            --dest release `
            --main-jar "Dragon's Dive-$env:VERSION.jar" `
            --main-class squidpony.epigon.desktop.DesktopLauncher

      - name: Archive package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd release
          zip -r "Dragon's Dive-${VERSION}-${RUNNER_OS}.zip" "Dragon's Dive"*

      - name: Archive package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path release/"Dragon's Dive"* -DestinationPath "release/Dragon's Dive-$env:VERSION-$env:RUNNER_OS.zip" -Force

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragons-dive-${{ runner.os }}
          path: release/*.zip

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-native
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and tag
        id: version
        shell: bash
        run: |
          VERSION="0.1.$(git rev-list --count HEAD)-$(git rev-parse --short HEAD)"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Dragon's Dive ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release-artifacts/**/*.zip
